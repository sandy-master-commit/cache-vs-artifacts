name: Cache et Artifacts

on:
  push:

jobs:
  install-et-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x

      # Cache : évite de re-télécharger les dépendances npm
      - name: Restaurer le cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-

      - run: npm ci

      - name: Simuler un build
        run: |
          mkdir dist
          cp hello.js dist/
          echo "Build du $(date)" > dist/build-info.txt

      # Artifact : transmet le dossier dist au job suivant
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  deployer:
    needs: install-et-build
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer l'artifact du build
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Vérifier le contenu reçu
        run: |
          echo "Fichiers reçus :"
          ls dist/
          cat dist/build-info.txt